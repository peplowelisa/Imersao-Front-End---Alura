    function getYouTubeId(url) {
        if (!url) return "7RUA0IOfar8";
        if (url.includes('v=')) return url.split('v=')[1].split('&')[0];
        return url.split('/').pop();
    }
    function randomScore()      { return Math.floor(Math.random() * 20 + 80); }
    function randomDuration(p)  { return p ? '10 temporadas' : '2h ' + Math.floor(Math.random() * 59) + 'm'; }
    function randomAge()        { return Math.random() > 0.5 ? {text:'A16',cls:'red-accent'} : {text:'16',cls:''}; }

    function createCard(item) {
        var card = document.createElement('div');
        card.className = 'movie-card';
        if (item.progress) card.classList.add('has-progress');

        var img = document.createElement('img');
        img.src = item.img;
        img.alt = 'Capa';
        img.loading = 'lazy';

        var iframe = document.createElement('iframe');
        iframe.frameBorder = "0";
        iframe.allow = "autoplay; encrypted-media";
        var videoId = getYouTubeId(item.youtube);

        card.appendChild(iframe);
        card.appendChild(img);

        if (item.top10) {
            var bt = document.createElement('div');
            bt.className = 'badge-top10';
            bt.innerHTML = '<span class="top">TOP</span><span class="number">10</span>';
            card.appendChild(bt);
        }
        if (item.badge) {
            var bb = document.createElement('div');
            bb.className = 'badge-bottom ' + (item.badgeColor || 'red');
            bb.textContent = item.badge;
            card.appendChild(bb);
        }

        var ageText = item.age || randomAge().text;
        var ageCls  = (ageText === 'A16' || ageText === 'A14') ? 'red-accent' : '';
        var duration = item.duration || randomDuration(item.progress);
        var tags = item.tags || ['Empolgante', 'Clássico', 'Ficção'];
        var tagsHTML = tags.map(function(t) { return '<span>' + t + '</span>'; }).join('');

        var det = document.createElement('div');
        det.className = 'card-details';
        det.innerHTML =
            '<div class="details-buttons">' +
                '<div class="left-buttons">' +
                    '<button class="btn-icon btn-play-icon"><i class="fas fa-play"></i></button>' +
                    '<button class="btn-icon"><i class="fas fa-plus"></i></button>' +
                    '<button class="btn-icon"><i class="fas fa-thumbs-up"></i></button>' +
                '</div>' +
                '<div class="right-buttons">' +
                    '<button class="btn-icon"><i class="fas fa-chevron-down"></i></button>' +
                '</div>' +
            '</div>' +
            '<div class="details-info">' +
                '<span class="match-score">' + randomScore() + '% relevante</span>' +
                '<span class="age-badge ' + ageCls + '">' + ageText + '</span>' +
                '<span class="duration">' + duration + '</span>' +
                '<span class="resolution">HD</span>' +
            '</div>' +
            '<div class="details-tags">' + tagsHTML + '</div>';
        card.appendChild(det);

        if (item.progress) {
            var pb = document.createElement('div');
            pb.className = 'progress-bar-container';
            var pv = document.createElement('div');
            pv.className = 'progress-value';
            pv.style.width = item.progress + '%';
            pb.appendChild(pv);
            card.appendChild(pb);
        }

        var pt;
        card.addEventListener('mouseenter', function() {
            var r = card.getBoundingClientRect();
            if (r.left < 100) card.classList.add('origin-left');
            else if (r.right > window.innerWidth - 100) card.classList.add('origin-right');
            pt = setTimeout(function() {
                iframe.src = 'https://www.youtube.com/embed/' + videoId +
                    '?autoplay=1&mute=1&controls=0&modestbranding=1&loop=1&playlist=' + videoId;
                iframe.classList.add('playing');
                img.classList.add('playing-video');
            }, 600);
        });
        card.addEventListener('mouseleave', function() {
            clearTimeout(pt);
            iframe.classList.remove('playing');
            img.classList.remove('playing-video');
            iframe.src = '';
            card.classList.remove('origin-left', 'origin-right');
        });

        return card;
    }

    function createCarousel(category) {
        var section = document.createElement('div');
        section.className = 'slider-section';

        var header = document.createElement('div');
        header.className = 'slider-header';

        var title = document.createElement('h2');
        title.className = 'slider-title';
        title.textContent = category.title;
        header.appendChild(title);
        section.appendChild(header);

        var row = document.createElement('div');
        row.className = 'movie-row';
        category.items.forEach(function(item) { row.appendChild(createCard(item)); });

        section.appendChild(row);
        return section;
    }

    var nome   = localStorage.getItem('perfilAtivoNome')   || 'Xicrinho';

    var container = document.getElementById('main-content');
    categories.forEach(function(cat) { container.appendChild(createCarousel(cat)); });
